<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f5f8;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --surface-strong: #111827;
      --text: #18212f;
      --text-muted: #667085;
      --border: #dbe3ee;
      --border-radius: 15px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
      --primary: #1d8cf0;
      --primary-hover: #1676cb;
      --success: #23a26d;
      --warning: #f59e0b;
      --warning-soft: rgba(245, 158, 11, 0.12);
      --danger: #e5484d;
      --danger-hover: #cb3d42;
      --danger-soft: rgba(229, 72, 77, 0.10);
      --log-bg: #0f172a;
      --log-border: rgba(148, 163, 184, 0.18);
      --log-text: #d7e0ea;
      --log-time: #7cc16b;
      --log-info: #6cb6ff;
      --log-warn: #f5c451;
      --log-error: #ff7b72;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --surface: #101827;
        --surface-soft: #172133;
        --surface-strong: #f8fafc;
        --text: #e5edf5;
        --text-muted: #95a3b8;
        --border: #233147;
        --border-radius: 15px;
        --shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
        --primary: #3787dd;
        --primary-hover: #59a0f2;
        --success: #35c88a;
        --warning: #ffb648;
        --warning-soft: rgba(255, 182, 72, 0.14);
        --danger: #fb4545;
        --danger-hover: #fa6969;
        --danger-soft: rgba(251, 69, 69, 0.14);
        --log-bg: #08101f;
        --log-border: rgba(148, 163, 184, 0.14);
        --log-text: #d7e0ea;
        --log-time: #86d67c;
        --log-info: #7cc4ff;
        --log-warn: #ffd166;
        --log-error: #ff8e8e;
      }
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      background: var(--surface);
      border-radius: 8px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 24px;
      margin-right: 10px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      color: var(--text);
      flex: 1;
    }

    .lang-button {
      width: auto;
      padding: 4px 8px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .lang-button:hover {
      background: var(--surface-soft);
      color: var(--text);
    }

    [dir="rtl"] .logo {
      margin-right: 0;
      margin-left: 10px;
    }

    .status-card {
      background: var(--surface-soft);
      border-radius: var(--border-radius);
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .status-item {
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-item:last-child {
      margin-bottom: 0;
    }

    .status-label {
      font-weight: 500;
      color: var(--text-muted);
      font-size: 14px;
    }

    .status-value {
      font-weight: 600;
      font-size: 14px;
    }

    #chatId {
      color: var(--primary);
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .banner {
      border-radius: var(--border-radius);
      padding: 12px 14px;
      margin-bottom: 15px;
      font-size: 13px;
      line-height: 1.45;
      border: 1px solid transparent;
    }

    .banner-danger {
      background: var(--danger-soft);
      border-color: var(--danger);
      color: var(--danger);
    }

    .banner-warning {
      background: var(--warning-soft);
      border-color: var(--warning);
      color: var(--warning);
    }

    .section-title {
      margin: 0 0 10px 0;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
    }

    .fingerprint {
      font-family: monospace;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-align: center;
      color: var(--text);
      padding: 8px 4px;
      user-select: all;
    }

    .hint {
      margin: 8px 0 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      font: inherit;
      font-size: 13px;
      resize: vertical;
      min-height: 56px;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .toggle-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px 0;
      padding: 15px;
      background: var(--surface-soft);
      border-radius: var(--border-radius);
      border: 1px solid var(--border);
    }

    .toggle-label {
      font-weight: 600;
      color: var(--text);
      font-size: 16px;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #9aa6b2;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: #fff;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--success);
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      background: #93a1b2;
      cursor: not-allowed;
    }

    .secondary-button {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--border);
    }

    .secondary-button:hover {
      background: var(--surface-soft);
      color: var(--primary-hover);
    }

    .danger-button {
      background: var(--danger);
    }

    .danger-button:hover {
      background: var(--danger-hover);
    }

    .logs {
      margin-top: 20px;
      max-height: 200px;
      overflow-y: auto;
      background: var(--log-bg);
      color: var(--log-text);
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      white-space: pre-wrap;
      border: 1px solid var(--log-border);
    }

    .log-entry {
      margin: 2px 0;
      padding: 2px 0;
      border-bottom: 1px solid var(--log-border);
    }

    .log-time { color: var(--log-time); }
    .log-info { color: var(--log-info); }
    .log-warn { color: var(--log-warn); }
    .log-error { color: var(--log-error); }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">🔒</div>
      <h1 data-i18n="appName">Pardeh</h1>
      <button id="langSwitch" class="lang-button" title="Language">🌐 EN</button>
    </div>

    <div id="rekeyWarning" class="banner banner-danger hidden" data-i18n="rekeyWarning"></div>

    <div id="legacyPeerWarning" class="banner banner-warning hidden" data-i18n="legacyPeerWarning"></div>

    <div id="legacyKeyWarning" class="banner banner-warning hidden" data-i18n="legacyKeyWarning"></div>

    <div class="status-card">
      <div class="status-item">
        <span class="status-label" data-i18n="chatIdLabel">Chat ID:</span>
        <span id="chatId" class="status-value" data-i18n="loading">Loading...</span>
      </div>

      <div class="status-item">
        <span class="status-label" data-i18n="encryptionLabel">Encryption:</span>
        <span id="encryptionStatus" class="status-value" data-i18n="checking">Checking...</span>
      </div>

      <div class="status-item">
        <span class="status-label" data-i18n="handshakeLabel">Handshake:</span>
        <span id="handshakeStatus" class="status-value" data-i18n="hsNotStarted">Not started</span>
      </div>

      <div class="status-item">
        <span class="status-label" data-i18n="keyStatusLabel">Key Status:</span>
        <span id="keyStatus" class="status-value" data-i18n="keyNone">No key</span>
      </div>
    </div>

    <div id="safetyCard" class="status-card hidden">
      <h3 class="section-title" data-i18n="safetyTitle">Safety number</h3>
      <div id="fingerprint" class="fingerprint"></div>
      <p class="hint" data-i18n="safetyHint"></p>
      <button id="copyFingerprint" class="secondary-button" style="margin-top: 10px;" data-i18n="copySafetyNumber">Copy safety number</button>
    </div>

    <div class="toggle-container">
      <span class="toggle-label" data-i18n="toggleLabel">Enable Encryption</span>
      <label class="switch">
        <input type="checkbox" id="encryptionToggle">
        <span class="slider"></span>
      </label>
    </div>

    <div id="composeCard" class="status-card hidden">
      <h3 class="section-title" data-i18n="composeTitle">Secure compose</h3>
      <textarea id="composeInput" rows="3" data-i18n-placeholder="composePlaceholder"></textarea>
      <p class="hint" data-i18n="composeHint"></p>
      <button id="composeSend" style="margin-top: 10px;" data-i18n="composeSend">Encrypt &amp; Send</button>
    </div>

    <div class="actions">
      <button id="initiateHandshake" disabled data-i18n="btnHandshake">Initiate Handshake</button>
      <button id="rotateKeys" class="secondary-button hidden" data-i18n="btnRotate">Rotate Keys</button>
      <button id="clearKeys" class="danger-button" data-i18n="btnClear">Clear Keys</button>
    </div>

    <p id="popupStatus" class="hint hidden" role="status"></p>

    <!-- uncomment only when developing -->
    <!-- <div style="margin-top: 20px;">
      <h3 class="section-title">Debug Logs</h3>
      <div class="logs" id="logs"></div>
    </div> -->
  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
