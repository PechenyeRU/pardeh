name: release

# Packages the extension and publishes a GitHub Release with the Chrome
# zip and Firefox xpi attached. Triggered by pushing a version tag
# (e.g. `git tag v2.0.2 && git push --tags`) or manually from the Actions
# tab (which builds and uploads artifacts without creating a release).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Build packages
        run: ./build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pardeh-packages
          path: dist/*
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.zip dist/*.xpi \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
