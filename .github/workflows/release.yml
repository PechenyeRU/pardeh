name: release

# Packages the extension and publishes a GitHub Release with:
#   - pardeh-<v>-chrome.zip          (unpacked / dev: Load unpacked)
#   - pardeh-<v>-chrome.crx          (signed CRX3, stable ID, for policy install)
#   - updates.xml                    (Chrome self-host update manifest)
#   - pardeh-<v>-firefox.xpi         (unsigned; temporary add-on / ESR)
#   - pardeh-<v>-firefox-signed.xpi  (AMO-unlisted signed; only when the AMO
#                                     API secrets are set — one-click install)
#
# Triggered by pushing a version tag (v*), or manually (builds artifacts,
# no release). Secrets:
#   CHROME_CRX_PRIVATE_KEY                (required for the .crx)
#   WEB_EXT_API_KEY / WEB_EXT_API_SECRET  (optional; AMO unlisted signing)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Build packages
        run: ./build.sh

      - name: Pack signed Chrome .crx + update manifest
        env:
          CHROME_CRX_PRIVATE_KEY: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CHROME_CRX_PRIVATE_KEY:-}" ]; then
            echo "::error::CHROME_CRX_PRIVATE_KEY secret is not set"
            exit 1
          fi
          VERSION="$(node -p "require('./manifest.json').version")"
          KEY_FILE="$(mktemp)"
          printf '%s' "$CHROME_CRX_PRIVATE_KEY" > "$KEY_FILE"

          rm -rf crxbuild && mkdir crxbuild
          (cd crxbuild && unzip -q "../dist/pardeh-${VERSION}-chrome.zip")

          CRX_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${GITHUB_REF_NAME:-v$VERSION}/pardeh-${VERSION}-chrome.crx"
          npx --yes crx3 \
            -p "$KEY_FILE" \
            -o "dist/pardeh-${VERSION}-chrome.crx" \
            -x "dist/updates.xml" \
            --crxURL "$CRX_URL" \
            crxbuild/manifest.json

          rm -f "$KEY_FILE"
          echo "Packed dist/pardeh-${VERSION}-chrome.crx (ID: gafeecfbmpdmhobcpcnppplibbipjonn)"
          cat dist/updates.xml

      - name: Sign Firefox xpi (AMO unlisted)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          set -uo pipefail
          if [ -z "${WEB_EXT_API_KEY:-}" ] || [ -z "${WEB_EXT_API_SECRET:-}" ]; then
            echo "AMO API secrets not set — skipping Firefox signing (unsigned xpi only)."
            exit 0
          fi
          VERSION="$(node -p "require('./manifest.json').version")"
          rm -rf ffbuild && mkdir ffbuild
          (cd ffbuild && unzip -q "../dist/pardeh-${VERSION}-firefox.xpi")
          # web-ext sign uploads the version to AMO and waits for approval.
          # The wait is bounded: a version flagged for human review (binary
          # files trigger that) can take days, and the release must not hang
          # on it. The upload survives on AMO either way, so the signed xpi
          # can be attached later by the amo-signed workflow.
          if npx --yes web-ext sign \
               --source-dir=ffbuild \
               --channel=unlisted \
               --approval-timeout=420000 \
               --api-key="$WEB_EXT_API_KEY" \
               --api-secret="$WEB_EXT_API_SECRET" 2>&1 | tee sign.log; then
            signed="$(ls web-ext-artifacts/*.xpi 2>/dev/null | head -1)"
            if [ -n "$signed" ]; then
              cp "$signed" "dist/pardeh-${VERSION}-firefox-signed.xpi"
              echo "Signed: dist/pardeh-${VERSION}-firefox-signed.xpi"
            fi
          elif grep -qiE "approval|timeout" sign.log; then
            echo "::warning::AMO did not approve ${VERSION} within the timeout (likely flagged for human review). Releasing without the signed xpi; once AMO approves, the amo-signed workflow attaches it (daily schedule or manual run)."
          else
            echo "::warning::web-ext sign failed (version may already exist on AMO); attaching unsigned xpi only. See sign.log above."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pardeh-packages
          path: |
            dist/*.zip
            dist/*.crx
            dist/*.xpi
            dist/updates.xml
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./manifest.json').version")"
          assets=(
            "dist/pardeh-${VERSION}-chrome.zip"
            "dist/pardeh-${VERSION}-chrome.crx"
            "dist/updates.xml"
            "dist/pardeh-${VERSION}-firefox.xpi"
          )
          if [ -f "dist/pardeh-${VERSION}-firefox-signed.xpi" ]; then
            assets+=("dist/pardeh-${VERSION}-firefox-signed.xpi")
          fi
          gh release create "$GITHUB_REF_NAME" \
            "${assets[@]}" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
