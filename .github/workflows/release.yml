name: release

# Packages the extension and publishes a GitHub Release with:
#   - pardeh-<v>-chrome.zip   (unpacked / dev: Load unpacked)
#   - pardeh-<v>-chrome.crx   (signed CRX3, stable ID, for enterprise policy)
#   - updates.xml             (Chrome self-host update manifest)
#   - pardeh-<v>-firefox.xpi  (unsigned; temporary add-on / ESR)
#
# Firefox is intentionally NOT signed: AMO signing would tie the add-on to
# a named Mozilla developer account.
#
# Triggered by pushing a version tag (v*), or manually (builds artifacts,
# no release). Secret used:
#   CHROME_CRX_PRIVATE_KEY  (required for the .crx)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Build packages
        run: ./build.sh

      - name: Pack signed Chrome .crx + update manifest
        env:
          CHROME_CRX_PRIVATE_KEY: ${{ secrets.CHROME_CRX_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CHROME_CRX_PRIVATE_KEY:-}" ]; then
            echo "::error::CHROME_CRX_PRIVATE_KEY secret is not set"
            exit 1
          fi
          VERSION="$(node -p "require('./manifest.json').version")"
          KEY_FILE="$(mktemp)"
          printf '%s' "$CHROME_CRX_PRIVATE_KEY" > "$KEY_FILE"

          rm -rf crxbuild && mkdir crxbuild
          (cd crxbuild && unzip -q "../dist/pardeh-${VERSION}-chrome.zip")

          CRX_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${GITHUB_REF_NAME:-v$VERSION}/pardeh-${VERSION}-chrome.crx"
          npx --yes crx3 \
            -p "$KEY_FILE" \
            -o "dist/pardeh-${VERSION}-chrome.crx" \
            -x "dist/updates.xml" \
            --crxURL "$CRX_URL" \
            crxbuild/manifest.json

          rm -f "$KEY_FILE"
          echo "Packed dist/pardeh-${VERSION}-chrome.crx (ID: gafeecfbmpdmhobcpcnppplibbipjonn)"
          cat dist/updates.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pardeh-packages
          path: |
            dist/*.zip
            dist/*.crx
            dist/*.xpi
            dist/updates.xml
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./manifest.json').version")"
          gh release create "$GITHUB_REF_NAME" \
            "dist/pardeh-${VERSION}-chrome.zip" \
            "dist/pardeh-${VERSION}-chrome.crx" \
            "dist/updates.xml" \
            "dist/pardeh-${VERSION}-firefox.xpi" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
