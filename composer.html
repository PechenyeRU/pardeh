<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <title>Pardeh secure composer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --text: #18212f;
      --muted: #667085;
      --border: #23a26d;
      --primary: #1d8cf0;
      --primary-hover: #1676cb;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101827;
        --text: #e5edf5;
        --muted: #95a3b8;
        --border: #35c88a;
        --primary: #3787dd;
        --primary-hover: #59a0f2;
      }
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      gap: 8px;
      padding: 4px;
      background: var(--bg);
      color: var(--text);
      border: 2px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    #emblem {
      display: flex;
      align-items: center;
      padding: 0 6px;
      font-size: 15px;
      letter-spacing: 2px;
      user-select: none;
      cursor: help;
      flex: 0 0 auto;
    }

    #input {
      flex: 1 1 auto;
      border: none;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 14px;
      line-height: 1.4;
      padding: 6px 0;
      min-width: 0;
    }

    #input::placeholder { color: var(--muted); }

    #send {
      flex: 0 0 auto;
      align-self: center;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
    }

    #send:hover { background: var(--primary-hover); }
    #send:disabled { opacity: 0.5; cursor: not-allowed; }

    #error {
      position: absolute;
      inset: auto 8px 100%;
      margin-bottom: 6px;
      background: #e5484d;
      color: #fff;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="emblem" title=""></div>
  <textarea id="input" rows="1" spellcheck="false"></textarea>
  <button id="send"></button>
  <div id="error" class="hidden" role="alert"></div>

  <script src="i18n.js"></script>
  <script src="composer.js"></script>
</body>
</html>
